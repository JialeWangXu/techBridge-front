<div class="filter-group" [class.subtle]="variant === 'subtle'" [class.volunteer]="role === 'volunteer'">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="btn filter-button"
      [class.primary]="variant === 'primary'"
      [class.active]="activeValue === option.value"
      (click)="filterChange.emit(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
