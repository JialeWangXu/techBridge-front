<div class="d-flex flex-column min-vh-100 app-shell">
  <header class="navbar navbar-light app-header px-3 px-md-4 py-3 sticky-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <a (click)="navigateTo('/')" class="brand-link">
        <img src="images/logo-clean.png" height="42" alt="TechBridge Logo">
      </a>

      <div class="d-flex align-items-center gap-2 gap-md-3">
        <span class="role-badge d-none d-md-inline-flex" [class.volunteer]="userRole === 'VOLUNTEER'">
          {{ userRole }}
        </span>
        <button (click)="logout()" class="btn btn-outline-danger d-flex align-items-center gap-2">
          <i class="bi bi-box-arrow-right"></i> Salir
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer py-4 mt-5">
    <div class="container text-center">
      <p class="mb-1 fw-bold">TechBridge &copy; 2026</p>
      <small>Conectando generaciones a trav&eacute;s de la tecnolog&iacute;a.</small>
    </div>
  </footer>
</div>
