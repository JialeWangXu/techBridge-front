<div class="container app-page">
  <app-page-header
    eyebrow="Solicitudes senior"
    title="Mis solicitudes de ayuda"
    icon="bi-calendar-event">
  </app-page-header>

  <div class="filter-group mb-3">
    <button (click)="updateCategoryOrStatus('', status)" class="btn btn-category" [class.active]="category === ''">Todas</button>
    <button (click)="updateCategoryOrStatus('AI_ONLY', status)" class="btn btn-category" [class.active]="category === 'AI_ONLY'">Solo tutorial IA</button>
    <button (click)="updateCategoryOrStatus('VOLUNTEER', status)" class="btn btn-category" [class.active]="category === 'VOLUNTEER'">Con voluntario</button>
  </div>

  <div class="filter-group subtle mb-4">
    @if(category == 'AI_ONLY'){
      <button (click)="updateCategoryOrStatus(category, RequestStatus.OPEN)" class="btn btn-filter" [class.active]="status === RequestStatus.OPEN">Abiertas</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.FINDING_VOLUNTEER)" class="btn btn-filter" [class.active]="status === RequestStatus.FINDING_VOLUNTEER">Encontrando voluntario</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.COMPLETED)" class="btn btn-filter" [class.active]="status === RequestStatus.COMPLETED">Finalizadas</button>
    }@else if(category == 'VOLUNTEER'){
      <button (click)="updateCategoryOrStatus(category, RequestStatus.IN_PROGRESS)" class="btn btn-filter" [class.active]="status === RequestStatus.IN_PROGRESS">En curso</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.CANCELLED)" class="btn btn-filter" [class.active]="status === RequestStatus.CANCELLED">Canceladas</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.COMPLETED)" class="btn btn-filter" [class.active]="status === RequestStatus.COMPLETED">Finalizadas</button>
    }@else{
      <button (click)="updateCategoryOrStatus(category, RequestStatus.OPEN)" class="btn btn-filter" [class.active]="status === RequestStatus.OPEN">Abiertas</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.FINDING_VOLUNTEER)" class="btn btn-filter" [class.active]="status === RequestStatus.FINDING_VOLUNTEER">Encontrando voluntario</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.IN_PROGRESS)" class="btn btn-filter" [class.active]="status === RequestStatus.IN_PROGRESS">En curso</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.CANCELLED)" class="btn btn-filter" [class.active]="status === RequestStatus.CANCELLED">Canceladas</button>
      <button (click)="updateCategoryOrStatus(category, RequestStatus.COMPLETED)" class="btn btn-filter" [class.active]="status === RequestStatus.COMPLETED">Finalizadas</button>
    }
  </div>

  <div class="row g-3">
    @if(helpRequests.length === 0){
      <div class="col-12">
        <app-empty-state message="No se ha encontrado ninguna solicitud de ayuda con el filtro aplicado."></app-empty-state>
      </div>
    }@else{
      @for (req of helpRequests; track req.id) {
        <div class="col-12">
          <a (click)="navigateToDetail(req.id)" class="text-decoration-none">
            <div class="request-card">
              <div class="status-indicator" [style.background-color]="statusConfig[req.status].color">
                <i class="bi" [class]="statusConfig[req.status].icon"></i>
              </div>

              <div class="request-main">
                <h4>{{req.title}}</h4>
                <p>
                  <i class="bi bi-clock me-1"></i>
                  Publicado: {{req.createdAt | date:'dd/MM/yyyy HH:mm'}}
                </p>
              </div>

              <div class="request-actions">
                <app-status-badge [config]="statusConfig[req.status]"></app-status-badge>
                <button class="btn btn-view">
                  Ver detalle <i class="bi bi-arrow-right-short"></i>
                </button>
              </div>
            </div>
          </a>
        </div>
      }
    }
  </div>
  @if (helpRequests.length>0) {
    <div class="d-flex justify-content-center mt-4">
      <app-pagenation
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="onPageChange($event)">
      </app-pagenation>
    </div>
  }
</div>
