<div class="container app-page">
  <app-page-header
    eyebrow="Solicitudes senior"
    title="Mis solicitudes de ayuda"
    icon="bi-calendar-event">
  </app-page-header>

  <app-filter-bar
    class="d-block mb-3"
    [options]="categoryOptions"
    [activeValue]="category"
    variant="primary"
    role="senior"
    (filterChange)="updateCategoryOrStatus($event, status)">
  </app-filter-bar>

  <app-filter-bar
    class="d-block mb-4"
    [options]="statusOptions"
    [activeValue]="status"
    variant="subtle"
    role="senior"
    (filterChange)="updateCategoryOrStatus(category, $event)">
  </app-filter-bar>

  <div class="row g-3">
    @if(helpRequests.length === 0){
      <div class="col-12">
        <app-empty-state message="No se ha encontrado ninguna solicitud de ayuda con el filtro aplicado."></app-empty-state>
      </div>
    }@else{
      @for (req of helpRequests; track req.id) {
        <div class="col-12">
          <a (click)="navigateToDetail(req.id)" class="text-decoration-none">
            <div class="request-card">
              <div class="status-indicator" [style.background-color]="statusConfig[req.status].color">
                <i class="bi" [class]="statusConfig[req.status].icon"></i>
              </div>

              <div class="request-main">
                <h4>{{req.title}}</h4>
                <p>
                  <i class="bi bi-clock me-1"></i>
                  Publicado: {{req.createdAt | date:'dd/MM/yyyy HH:mm'}}
                </p>
              </div>

              <div class="request-actions">
                <app-status-badge [config]="statusConfig[req.status]"></app-status-badge>
                <button class="btn btn-view">
                  Ver detalle <i class="bi bi-arrow-right-short"></i>
                </button>
              </div>
            </div>
          </a>
        </div>
      }
    }
  </div>
  @if (helpRequests.length>0) {
    <div class="d-flex justify-content-center mt-4">
      <app-pagenation
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="onPageChange($event)">
      </app-pagenation>
    </div>
  }
</div>
